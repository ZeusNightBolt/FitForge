# FitForge — Supabase local/CI configuration
# A string used to distinguish different Supabase projects on the same host.
project_id = "fitforge"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# Public read bucket for exercise imagery/video thumbnails.
[storage.buckets.exercise-media]
public = true
file_size_limit = "50MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "video/mp4"]

# Private, owner-scoped bucket for user progress photos ({user_id}/{uuid}.jpg).
[storage.buckets.progress-photos]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/heic"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = false

[analytics]
enabled = false

[edge_runtime]
enabled = true
