name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Shared TypeScript package (@fitforge/shared): rule mirrors, zod, RPC types.
  # -------------------------------------------------------------------------
  shared:
    name: shared · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck -w @fitforge/shared
      - name: Build
        run: npm run build -w @fitforge/shared
      - name: Test
        run: npm run test -w @fitforge/shared

  # -------------------------------------------------------------------------
  # Web app (@fitforge/web): Next.js lint + production build.
  # -------------------------------------------------------------------------
  web:
    name: web · lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      # @fitforge/web imports @fitforge/shared's build output.
      - name: Build shared dependency
        run: npm run build -w @fitforge/shared
      - name: Lint
        run: npm run lint -w @fitforge/web
      - name: Build
        run: npm run build -w @fitforge/web
        env:
          # Public placeholders so `next build` can statically evaluate env access.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  # -------------------------------------------------------------------------
  # Seed content (@fitforge/seed): validation gate + validator unit tests.
  # -------------------------------------------------------------------------
  seed:
    name: seed · seed:check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate seed data (referential integrity, alt_group, macro sanity)
        run: npm run seed:check -w @fitforge/seed
      - name: Validator unit tests
        run: npm run test -w @fitforge/seed

  # -------------------------------------------------------------------------
  # Database (schema + RPCs): boot the local Supabase stack, apply migrations,
  # load the seed, and run the pgTAP suites in supabase/tests/**.
  # -------------------------------------------------------------------------
  db:
    name: db · migrate + reset + pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      # `db reset` re-applies migrations 0001..0005 and loads supabase/seed/seed.sql
      # (config.toml points db.seed.sql_paths at it). Fails if any migration errors.
      - name: Apply migrations + seed (db reset)
        run: supabase db reset

      - name: Run pgTAP suites (schema + rpc)
        run: supabase test db

      - name: Stop stack
        if: always()
        run: supabase stop --no-backup

  # -------------------------------------------------------------------------
  # iOS app (apps/ios): resolve the XcodeGen project and build for simulator.
  # macOS runner. Build (and unit tests) only — no signing.
  # -------------------------------------------------------------------------
  ios:
    name: ios · build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Build & test (iPhone simulator)
        working-directory: apps/ios
        run: |
          set -o pipefail
          xcodebuild \
            -scheme FitForge \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipPackagePluginValidation \
            clean build test \
            | xcbeautify || xcodebuild \
              -scheme FitForge \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              -skipPackagePluginValidation \
              clean build test
