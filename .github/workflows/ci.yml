name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Shared TypeScript package (@fitforge/shared): rule mirrors, zod, RPC types.
  shared:
    name: shared · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build -w @fitforge/shared
      - run: npm run test -w @fitforge/shared

  # Web app (@fitforge/web): typecheck + static-export build (demo mode).
  web:
    name: web · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared dependency
        run: npm run build -w @fitforge/shared
      - name: Typecheck
        run: npm run typecheck -w @fitforge/web
      - name: Build (static export)
        run: npm run build -w @fitforge/web
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_DEMO: "1"

  # Seed content (@fitforge/seed): validation gate + validator unit tests.
  seed:
    name: seed · check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validate seed data
        run: npm run seed:check -w @fitforge/seed
      - name: Validator unit tests
        run: npm run test -w @fitforge/seed

  # NOTE: the database (Supabase local stack + pgTAP) and iOS (macOS + xcodebuild)
  # jobs are deferred until those layers are wired to a live stack / verified on a
  # Mac. Their sources live under supabase/ and apps/ios/. Re-add dedicated
  # workflows once verified end-to-end.
