# XcodeGen project spec (https://github.com/yonaskolb/XcodeGen).
# Generate the .xcodeproj with:  cd apps/ios && xcodegen generate
# The project file itself is intentionally NOT committed — this spec is the
# reviewable source of truth (BLUEPRINT §9 WS-8).

name: FitForge
options:
  bundleIdPrefix: com.fitforge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set your team id locally / in CI
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Swift 5 language mode (default minimal concurrency checking) keeps the MVP
    # buildable; tighten to `targeted`/`complete` once wired into CI.
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.1"

targets:
  FitForge:
    type: application
    platform: iOS
    sources:
      - path: FitForge/App
      - path: FitForge/Core
      - path: FitForge/Features
      - path: FitForge/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitforge.app
        INFOPLIST_FILE: FitForge/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitForge/Resources/FitForge.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1" # iPhone (mobile/thumb-first, §1.3)
        SUPPORTS_MACCATALYST: NO
        # SUPABASE_URL / SUPABASE_ANON_KEY are read from Info.plist; populate them
        # from your environment (.env) via a build setting or a run script.

  FitForgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FitForge/Tests
    dependencies:
      - target: FitForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitforge.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FitForge:
    build:
      targets:
        FitForge: all
        FitForgeTests: [test]
    test:
      targets:
        - FitForgeTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
